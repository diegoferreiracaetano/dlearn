name: Code Review

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  code-review:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review the code changes in this PR. Focus on:
            - Code reuse: duplicated logic, existing utilities that could be used
            - Code quality: hardcoded strings/magic values, unnecessary comments, leaky abstractions
            - Efficiency: N+1 patterns, missed concurrency, unnecessary work
            - Correctness: logic bugs, wrong types, translation errors

            Be concise. Post a single summary comment grouping findings by severity (high/medium/low).
            Skip formatting-only changes and test boilerplate.
