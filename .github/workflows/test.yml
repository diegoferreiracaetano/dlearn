name: CI Pipeline (Lint & Test)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Run Detekt
        run: ./gradlew detektAll --stacktrace

  unit-tests:
    name: Unit Tests (Server, Shared & App)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run All Unit Tests
        # Executa testes do Server (JVM), Shared (Android/JVM) e App (Android)
        run: ./gradlew :server:test :shared:testDebugUnitTest :shared:jvmTest :composeApp:testDebugUnitTest --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

  android-instrumented-tests:
    name: Android Instrumented Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run Emulator and Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Roda testes instrumentados no App e no Shared (se houver)
          script: ./gradlew connectedDebugAndroidTest

  coverage:
    name: Coverage Report
    needs: [unit-tests, android-instrumented-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      
      - name: Generate Kover & Jacoco Reports
        run: ./gradlew koverXmlReport jacocoAndroidTestReport --continue || echo "Some reports failed to generate"

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/kover
            **/build/reports/jacoco
            **/build/test-results
