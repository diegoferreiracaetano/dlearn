site_name: DLearn SDUI Documentation
site_description: Arquitetura de Server-Driven UI (SDUI) com Kotlin Multiplatform.
site_url: https://diegoferreiracaetano.github.io/dlearn

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Início: index.md
  - Shared (KMP): kmp/index.md
  - Server (Ktor BFF): server/index.md
  - Mobile (Compose): mobile/index.md
  - Arquitetura SDUI: sdui/architecture.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

docs_dir: docs
site_dir: site
