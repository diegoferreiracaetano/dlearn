components:
  schemas:
    # --- SDUI Base ---
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type: { type: string }
        id: { type: string }

    # --- SDUI Components ---
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar: { $ref: '#/components/schemas/Component' }
            searchBar: { $ref: '#/components/schemas/Component' }
            bottomBar: { $ref: '#/components/schemas/Component' }
    
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: string }
            subtitle: { type: string }
    
    AppLoadingComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            message: { type: string }

    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: string }
            imageUrl: { type: string }
