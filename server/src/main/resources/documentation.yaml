openapi: 3.0.3
info:
  title: "DLearn BFF API"
  version: "1.3.1"
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.

servers:
  - url: "http://localhost:8081"
    description: "Local Server"

paths:
  /v1/main:
    get:
      tags: ["SDUI"]
      summary: "Get Main Shell"
      description: "Returns the main screen shell configuration (BottomNav, AppContainer)."
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/app:
    post:
      tags: ["SDUI"]
      summary: "SDUI Gateway"
      description: "Central gateway for dynamic screens and actions (home, favorite, watchlist, profile, edit, update, verify)."
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/home:
    get:
      tags: ["Business"]
      summary: "Get Home Screen"
      parameters: 
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - name: "type"
          in: query
          required: false
          schema:
            type: string
            enum: ["ALL", "MOVIE", "SERIES"]
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/search/main:
    get:
      tags: ["Search"]
      summary: "Get Search Main Content"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/search/result:
    get:
      tags: ["Search"]
      summary: "Search Content Result"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/movie/{movieId}:
    get:
      tags: ["Business"]
      summary: "Get Movie Detail Screen"
      parameters:
        - name: "movieId"
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/profile:
    get:
      tags: ["Profile"]
      summary: "Get Profile Screen"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/profile/edit:
    get:
      tags: ["Profile"]
      summary: "Get Edit Profile Screen"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

  /v1/profile/update:
    post:
      tags: ["Profile"]
      summary: "Update Profile Data"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/acceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: { type: "string" }
      responses:
        '200':
          description: "Success"

  /v1/password/change:
    post:
      tags: ["Security"]
      summary: "Change User Password (MFA Protected)"
      description: "Protegido pelo Motor de Desafios. Requer o header X-Challenge-Token após a resolução."
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: "Senha alterada com sucesso"
        '428':
          description: "Precondition Required - MFA Challenge Necessary"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeSession'

  /v1/auth/challenge/resolve:
    post:
      tags: ["Security"]
      summary: "Resolve Security Challenge"
      description: "Valida as respostas do desafio (OTP/Biometria) e retorna um token de prova."
      parameters:
        - $ref: '#/components/parameters/transactionIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveChallengeRequest'
      responses:
        '200':
          description: "Desafio resolvido com sucesso"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveChallengeResponse'

  /v1/auth/challenge/resend:
    post:
      tags: ["Security"]
      summary: "Resend Security Challenge"
      description: "Gera um novo código para a transação atual."
      parameters:
        - $ref: '#/components/parameters/transactionIdHeader'
      responses:
        '200':
          description: "Desafio reenviado com sucesso"

components:
  parameters:
    userId:
      name: "userId"
      in: query
      schema: { type: "string" }
    appVersion:
      name: "X-App-Version"
      in: header
      schema: { type: "integer" }
    acceptLanguage:
      name: "Accept-Language"
      in: header
      schema: { type: "string" }
    challengeToken:
      name: "X-Challenge-Token"
      in: header
      schema: { type: "string" }
    transactionIdHeader:
      name: "X-Transaction-Id"
      in: header
      required: true
      schema: { type: "string" }

  securitySchemes:
    ChallengeAuth:
      type: "apiKey"
      in: header
      name: "X-Challenge-Token"

  schemas:
    # --- Challenge Engine Models ---
    ChallengeType:
      type: string
      enum: ["OTP_SMS", "OTP_EMAIL", "BIOMETRIC", "PASSWORD", "TOTP", "UNKNOWN"]

    ChallengeSession:
      type: object
      required: ["transactionId", "challenges"]
      properties:
        transactionId: { type: "string" }
        message: { type: "string" }
        challenges:
          type: array
          items: { $ref: '#/components/schemas/Challenge' }
        expiresAt: { type: "integer", format: "int64" }

    Challenge:
      type: object
      required: ["challengeType"]
      properties:
        challengeType: { $ref: '#/components/schemas/ChallengeType' }
        data:
          type: object
          additionalProperties: { type: "string" }

    ResolveChallengeRequest:
      type: object
      required: ["type", "answers"]
      properties:
        type: { $ref: '#/components/schemas/ChallengeType' }
        answers:
          type: object
          additionalProperties: { type: "string" }

    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken: { type: "string" }
        success: { type: "boolean" }
        message: { type: "string" }

    # --- Business Models ---
    ChangePasswordRequest:
      type: object
      required: ["newPassword"]
      properties:
        userId: { type: "string" }
        currentPassword: { type: "string" }
        newPassword: { type: "string" }

    # --- SDUI Core Models ---
    AppRequest:
      type: object
      required: ["path"]
      properties:
        path: { type: "string" }
        params:
          type: object
          additionalProperties: { type: "string" }
        metadata:
          type: object
          additionalProperties: { type: "string" }

    Screen:
      type: object
      properties:
        id: { type: "string" }
        components:
          type: array
          items: { $ref: '#/components/schemas/Component' }

    Component:
      type: object
      discriminator:
        propertyName: "type"
      properties:
        type: { type: "string" }

    # --- SDUI Components ---
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar: { $ref: '#/components/schemas/Component' }
            bottomBar: { $ref: '#/components/schemas/Component' }
            components: { type: array, items: { $ref: '#/components/schemas/Component' } }

    AppTopBarListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            selectedRoute: { type: "string" }
            items:
              type: array
              items:
                type: object
                properties:
                  route: { type: "string" }
                  topBar: { $ref: '#/components/schemas/AppTopBarComponent' }

    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            subtitle: { type: "string" }
            imageUrl: { type: "string" }
            showSearch: { type: "boolean" }

    AppSearchBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            query: { type: "string" }
            placeholder: { type: "string" }

    MovieCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            items:
              type: array
              items: { $ref: '#/components/schemas/movie_item' }

    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id: { type: "string" }
            title: { type: "string" }
            imageUrl: { type: "string" }
            rating: { type: "string" }
            year: { type: "string" }
            duration: { type: "string" }

    AppProfileHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name: { type: "string" }
            email: { type: "string" }
            imageUrl: { type: "string" }
            onImagePickedAction: { type: "string" }

    AppMovieDetailHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            imageUrl: { type: "string" }
            rating: { type: "number" }
            year: { type: "string" }
            duration: { type: "string" }
            genre: { type: "string" }
            isFavorite: { type: "boolean" }
            isInList: { type: "boolean" }
            downloadActionUrl: { type: "string" }
            shareActionUrl: { type: "string" }

    AppSearchContentComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object

    AppSnackbarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            message: { type: "string" }
            snackbarType: { type: "string", enum: ["SUCCESS", "ERROR", "WARNING"] }
            durationMillis: { type: "integer", format: "int64" }

    AppFeedbackComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            description: { type: "string" }
            imageSource: { type: "string" }
            primaryText: { type: "string" }
            secondaryText: { type: "string" }

    AppTextFieldComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            value: { type: "string" }
            label: { $ref: '#/components/schemas/AppStringType' }
            placeholder: { $ref: '#/components/schemas/AppStringType' }
            fieldType: { $ref: '#/components/schemas/AppTextFieldType' }
            key: { type: "string" }
            isError: { type: "boolean" }

    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  label: { type: "string" }
                  route: { type: "string" }
                  icon: { $ref: '#/components/schemas/AppIconType' }
            selectedRoute: { type: "string" }

    BannerCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            items: { type: array, items: { $ref: '#/components/schemas/movie_item' } }

    FullScreenBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id: { type: "string" }
            title: { type: "string" }
            imageUrl: { type: "string" }

    ProfileRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name: { type: "string" }
            email: { type: "string" }
            imageUrl: { type: "string" }
            editActionUrl: { type: "string" }

    SectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }
            items:
              type: array
              items:
                type: object
                properties:
                  label: { type: "string" }
                  icon: { $ref: '#/components/schemas/AppIconType' }
                  actionUrl: { type: "string" }

    AppListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            components: { type: array, items: { $ref: '#/components/schemas/Component' } }

    AppSectionTitleComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: "string" }

    # --- Enums & Types ---
    AppIconType:
      type: string
      enum: ["HOME", "SEARCH", "FAVORITE", "PERSON", "WATCHLIST", "LOCK", "NOTIFICATIONS", "LANGUAGE", "PUBLIC", "DELETE", "POLICY", "HELP", "INFO", "WORKSPACE_PREMIUM", "PLAY_ARROW", "DOWNLOAD", "SHARE", "CALENDAR_MONTH", "SCHEDULE", "STAR", "UNKNOWN"]

    AppStringType:
      type: string
      enum: ["PROFILE_TITLE", "PREMIUM_MEMBER", "PREMIUM_DESCRIPTION", "SECTION_ACCOUNT", "ITEM_MEMBER", "ITEM_PASSWORD", "SECTION_GENERAL", "ITEM_NOTIFICATION", "ITEM_LANGUAGE", "ITEM_COUNTRY", "ITEM_CLEAR_CACHE", "SECTION_MORE", "ITEM_LEGAL", "ITEM_HELP", "ITEM_ABOUT", "LOGOUT", "HOME_TITLE", "HOME_SUBTITLE", "NAV_HOME", "NAV_WATCHLIST", "NAV_SEARCH", "NAV_FAVORITES", "NAV_PROFILE", "APP_NAME", "EDIT_PROFILE_TITLE", "FIELD_FULL_NAME", "FIELD_EMAIL", "FIELD_PASSWORD", "FIELD_PHONE_NUMBER", "SAVE_CHANGES", "ERROR_NAME_EXIST", "UPDATE_PROFILE_SUCCESS", "UPDATE_PROFILE_ERROR", "DETAIL_TRAILER", "DETAIL_STORY_LINE", "DETAIL_CAST_CREW", "DETAIL_EPISODE", "DETAIL_WATCH_NOW", "SEARCH_PLACEHOLDER", "SEARCH_EMPTY_TITLE", "SEARCH_EMPTY_DESCRIPTION", "WATCHLIST_EMPTY_TITLE", "WATCHLIST_EMPTY_DESCRIPTION", "FAVORITE_EMPTY_TITLE", "FAVORITE_EMPTY_DESCRIPTION", "PASSWORD_OTP_REQUIRED", "PASSWORD_OTP_VERIFIED", "UNKNOWN"]

    AppTextFieldType:
      type: string
      enum: ["NONE", "EMAIL", "PASSWORD", "PHONE"]
