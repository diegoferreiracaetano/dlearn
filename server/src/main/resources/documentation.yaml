openapi: 3.0.3
info:
  title: "DLearn BFF API"
  version: "1.2.3"
  description: "API for Server-Driven UI in DLearn App. Security and MFA are handled by a Generic Challenge Engine."

servers:
  - url: "http://localhost:8081"
    description: "Local Server"

paths:
  /v1/main:
    get:
      tags: ["SDUI"]
      summary: "Get Main Shell"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Screen' }

  /v1/app:
    post:
      tags: ["SDUI"]
      summary: "SDUI Gateway"
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppRequest' }
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Screen' }

  /v1/password/change:
    post:
      tags: ["Security"]
      summary: "Change User Password (MFA Protected)"
      description: "Exige o header X-Challenge-Token após a resolução."
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          description: "OK"
        '428':
          description: "MFA Required"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChallengeSession' }

  /v1/auth/challenge/resolve:
    post:
      tags: ["Security"]
      summary: "Resolve Security Challenge"
      description: "Valida as respostas do desafio. O Transaction ID deve vir no Header."
      parameters:
        - $ref: '#/components/parameters/transactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveChallengeRequestBody'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveChallengeResponse'

  /v1/auth/challenge/resend:
    post:
      tags: ["Security"]
      summary: "Resend Security Challenge"
      description: "Gera um novo código. O Transaction ID deve vir no Header."
      parameters:
        - $ref: '#/components/parameters/transactionId'
      responses:
        '200':
          description: "Reenviado com sucesso"
        '404':
          description: "Transação não encontrada"

components:
  parameters:
    userId:
      name: "userId"
      in: query
      schema: { type: "string" }
    appVersion:
      name: "X-App-Version"
      in: header
      schema: { type: "integer" }
    challengeToken:
      name: "X-Challenge-Token"
      in: header
      schema: { type: "string" }
    transactionId:
      name: "X-Transaction-Id"
      in: header
      required: true
      description: "O ID da transação de desafio recebido no erro 428."
      schema: { type: "string" }

  schemas:
    ChallengeSession:
      type: object
      required: ["transactionId", "message"]
      properties:
        transactionId: { type: "string", example: "CHALLENGE_1711045039000" }
        message: { type: "string", example: "Please enter the code sent to your email" }

    ResolveChallengeRequestBody:
      type: object
      required: ["type", "answers"]
      properties:
        type: { $ref: '#/components/schemas/ChallengeType' }
        answers:
          type: object
          example: { "otp": "123456" }
          additionalProperties: { type: "string" }

    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken: { type: "string", example: "VALIDATED_CHALLENGE_1711045039000" }
        success: { type: "boolean", example: true }

    ChallengeType:
      type: string
      enum: ["OTP_SMS", "OTP_EMAIL", "BIOMETRIC", "PASSWORD", "TOTP", "UNKNOWN"]

    ChangePasswordRequest:
      type: object
      required: ["userId", "newPassword"]
      properties:
        userId: { type: "string", example: "user_123" }
        newPassword: { type: "string", example: "NewPass@2024" }

    # --- SDUI Models (Simplificados para brevidade) ---
    Screen:
      type: object
      properties:
        id: { type: "string" }
        components: { type: array, items: { type: object } }
    AppRequest:
      type: object
      required: ["path"]
      properties:
        path: { type: "string" }
