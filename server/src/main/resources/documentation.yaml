openapi: 3.0.3
info:
  title: DLearn BFF API
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.
  version: 1.1.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/main:
    get:
      summary: Get Main Shell
      description: Returns the main screen shell configuration.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/app:
    post:
      summary: SDUI Gateway
      description: Central gateway for dynamic screens and actions.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/home:
    get:
      summary: Get Home Screen
      parameters: 
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, MOVIE, SERIES]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/search/main:
    get:
      summary: Get Search Main Content
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/movie/{movieId}:
    get:
      summary: Get Movie Detail Screen
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  
  /v1/password/change:
    post:
      summary: Change User Password (MFA Protected)
      description: Protegido pelo Motor de Desafios. Exige header X-Challenge-Token após resolução.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: OK
        '428':
          description: Challenge Required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeSession'

  /v1/auth/challenge/resolve:
    post:
      summary: Resolve Security Challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveChallengeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveChallengeResponse'

components:
  parameters:
    userId:
      name: userId
      in: query
      schema:
        type: string
    appVersion:
      name: X-App-Version
      in: header
      schema:
        type: integer
    acceptLanguage:
      name: Accept-Language
      in: header
      schema:
        type: string
    challengeToken:
      name: X-Challenge-Token
      in: header
      schema:
        type: string

  schemas:
    # --- Challenge Engine ---
    ChallengeType:
      type: string
      enum: [OTP_SMS, OTP_EMAIL, BIOMETRIC, PASSWORD, TOTP, UNKNOWN]
    ChallengeSession:
      type: object
      required: [transactionId, challenges]
      properties:
        transactionId:
          type: string
        challenges:
          type: array
          items:
            $ref: '#/components/schemas/Challenge'
    Challenge:
      type: object
      required: [challengeType]
      properties:
        challengeType:
          $ref: '#/components/schemas/ChallengeType'
        data:
          type: object
          additionalProperties:
            type: string
    ResolveChallengeRequest:
      type: object
      required: [transactionId, type, answers]
      properties:
        transactionId:
          type: string
        type:
          $ref: '#/components/schemas/ChallengeType'
        answers:
          type: object
          additionalProperties:
            type: string
    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken:
          type: string
        success:
          type: boolean
    
    # --- Business Models ---
    ChangePasswordRequest:
      type: object
      required: [userId, newPassword]
      properties:
        userId:
          type: string
        newPassword:
          type: string

    # --- SDUI Core ---
    AppRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string

    # --- SDUI Components ---
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar: { $ref: '#/components/schemas/Component' }
            bottomBar: { $ref: '#/components/schemas/Component' }
            components: { type: array, items: { $ref: '#/components/schemas/Component' } }
    
    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id: { type: string }
            title: { type: string }
            imageUrl: { type: string }
            rating: { type: string }
    
    MovieCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title: { type: string }
            items: { type: array, items: { $ref: '#/components/schemas/movie_item' } }
    
    AppTextFieldComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            value: { type: string }
            label: { $ref: '#/components/schemas/AppStringType' }
            fieldType: { $ref: '#/components/schemas/AppTextFieldType' }
            key: { type: string }

    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/BottomNavItem' } }
            selectedRoute: { type: string }

    BottomNavItem:
      type: object
      properties:
        label: { type: string }
        route: { type: string }
        icon: { $ref: '#/components/schemas/AppIconType' }

    # --- Enums & Types ---
    AppIconType:
      type: string
      enum: [HOME, SEARCH, FAVORITE, PERSON, WATCHLIST, LOCK, UNKNOWN]
    AppStringType:
      type: string
      enum: [HOME_TITLE, NAV_HOME, NAV_PROFILE, FIELD_PASSWORD, UNKNOWN]
    AppTextFieldType:
      type: string
      enum: [NONE, EMAIL, PASSWORD, PHONE]
    
    AppAction:
      type: object
      discriminator:
        propertyName: type
      properties:
        type: { type: string }
    
    navigation:
      allOf:
        - $ref: '#/components/schemas/AppAction'
        - type: object
          properties:
            route: { type: string }
