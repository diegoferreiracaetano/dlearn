openapi: 3.0.3
info:
  title: DLearn BFF API
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.
  version: 1.3.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/app:
    post:
      summary: SDUI Gateway / BFF Generic Endpoint
      tags:
        - SDUI Gateway
      description: |
        Central gateway for dynamic screens and actions.
        The client sends a `path` (slug), `language`, `country` and optional `params`.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/userAgent'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/xCountry'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/main:
    get:
      summary: Get Main Shell (Legacy/Initial)
      tags:
        - Legacy
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/userAgent'
        - $ref: '#/components/parameters/acceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/home:
    get:
      summary: Get Home Screen (Legacy)
      tags:
        - Legacy
      parameters: 
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/userAgent'
        - $ref: '#/components/parameters/acceptLanguage'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, MOVIE, SERIES]
          example: ALL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

components:
  parameters:
    userId:
      name: userId
      in: query
      required: false
      schema:
        type: string
      example: diego
    appVersion:
      name: X-App-Version
      in: header
      required: false
      schema:
        type: integer
      example: 1
    userAgent:
      name: User-Agent
      in: header
      required: false
      description: "Client info: appName/appVersion (deviceName)"
      schema:
        type: string
      example: "DLearn/1.0.0 (Swagger)"
    acceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      example: en-US
    xCountry:
      name: X-Country
      in: header
      required: false
      schema:
        type: string
      example: US
    challengeToken:
      name: X-Challenge-Token
      in: header
      required: false
      description: "Token obtained after resolving a challenge."
      schema:
        type: string
    challengePreference:
      name: X-Challenge-Preference
      in: header
      required: false
      description: "Suggested challenge method (e.g. BIOMETRIC)."
      schema:
        $ref: '#/components/schemas/ChallengeType'
  schemas:
    # --- Challenge Engine Models ---
    ChallengeType:
      type: string
      enum: [OTP_SMS, OTP_EMAIL, BIOMETRIC, PASSWORD, TOTP, PUSH_NOTIFICATION, KBA, DEVICE_BINDING, UNKNOWN]
    ChallengeStatus:
      type: string
      enum: [SUCCESS, CHALLENGE_REQUIRED, ERROR]
    ChallengeSession:
      type: object
      required: [transactionId, challenges]
      properties:
        transactionId:
          type: string
        challenges:
          type: array
          items:
            $ref: '#/components/schemas/Challenge'
        expiresAt:
          type: integer
          format: int64
    Challenge:
      type: object
      required: [challengeType]
      properties:
        challengeType:
          $ref: '#/components/schemas/ChallengeType'
        data:
          type: object
          additionalProperties:
            type: string
    ResolveChallengeRequest:
      type: object
      required: [transactionId, type, answers]
      properties:
        transactionId:
          type: string
        type:
          $ref: '#/components/schemas/ChallengeType'
        answers:
          type: object
          additionalProperties:
            type: string
    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken:
          type: string
        success:
          type: boolean
        message:
          type: string

    # --- Business Models ---
    ChangePasswordRequest:
      type: object
      required: [userId, newPassword]
      properties:
        userId:
          type: string
        newPassword:
          type: string

    # --- SDUI Models ---
    AppRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Route path (e.g. 'home', 'profile', 'settings/language')
          example: "settings/language"
        language:
          type: string
          description: Target language (e.g. 'en-US')
          example: "en-US"
        country:
          type: string
          description: Target country (e.g. 'US')
          example: "US"
        params:
          type: object
          description: Query parameters or route arguments
          additionalProperties:
            type: string
          example:
            ref: "privacy-policy"
        metadata:
          type: object
          additionalProperties:
            type: string
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string

    # --- SDUI Components ---
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar:
              $ref: '#/components/schemas/Component'
            searchBar:
              $ref: '#/components/schemas/Component'
            chipGroup:
              $ref: '#/components/schemas/Component'
            bottomBar:
              $ref: '#/components/schemas/Component'
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            showSearch:
              type: boolean
    AppTopBarListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AppTopBarItem'
            selectedRoute:
              type: string
    AppTopBarItem:
      type: object
      properties:
        topBar:
          $ref: '#/components/schemas/AppTopBarComponent'
        route:
          type: string
    AppSearchBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            query:
              type: string
            placeholder:
              type: string
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppEmptyStateComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            image:
              $ref: '#/components/schemas/AppImageType'
    AppListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppSwitchRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            icon:
              $ref: '#/components/schemas/AppIconType'
            preferenceKey:
              type: string
            isChecked:
              type: boolean
    AppSelectionRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            value:
              type: string
            preferenceKey:
              type: string
            isSelected:
              type: boolean
    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            rating:
              type: string
            year:
              type: string
            duration:
              type: string
            contentRating:
              type: string
            genre:
              type: string
            movieType:
              type: string
            isPremium:
              type: boolean
            rank:
              type: integer
            actionUrl:
              type: string
    app_search_content:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    AppMovieDetailHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            imageUrl:
              type: string
            year:
              type: string
            duration:
              type: string
            genre:
              type: string
            rating:
              type: number
            trailerId:
              type: string
            downloadActionUrl:
              type: string
            shareActionUrl:
              type: string
            isFavorite:
              type: boolean
            isInList:
              type: boolean
            providers:
              type: array
              items:
                $ref: '#/components/schemas/WatchProviderComponent'
    WatchProviderComponent:
      type: object
      properties:
        name:
          type: string
        iconUrl:
          type: string
        priceInfo:
          type: string
        appUrl:
          type: string
        webUrl:
          type: string
        tmdbUrl:
          type: string
    AppExpandableSectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            text:
              type: string
            maxLines:
              type: integer
    CarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    MovieCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    BannerCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    FullScreenBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
    ChipGroupComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ChipItem'
    ChipItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        isSelected:
          type: boolean
        hasDropDown:
          type: boolean
        isFilter:
          type: boolean
        options:
          type: array
          items:
            $ref: '#/components/schemas/ChipItem'
    UserRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            role:
              type: string
            imageUrl:
              type: string
            actionUrl:
              type: string
    ProfileRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            editActionUrl:
              type: string
    AppProfileHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            onImagePickedAction:
              type: string
    AppTextFieldComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            value:
              type: string
            placeholder:
              $ref: '#/components/schemas/AppStringType'
            label:
              $ref: '#/components/schemas/AppStringType'
            supportingText:
              $ref: '#/components/schemas/AppStringType'
            isError:
              type: boolean
            fieldType:
              $ref: '#/components/schemas/AppTextFieldType'
            key:
              type: string
    AppFeedbackComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            imageSource:
              type: string
            primaryText:
              type: string
            secondaryText:
              type: string
    PremiumBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            icon:
              $ref: '#/components/schemas/AppIconType'
    AppHtmlTextComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            html:
              type: string
    AppSnackbarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            message:
              type: string
            snackbarType:
              $ref: '#/components/schemas/AppSnackbarType'
            durationMillis:
              type: integer
              format: int64

    # --- Types & Enums ---
    AppSnackbarType:
      type: string
      enum: [SUCCESS, ERROR, WARNING]
    AppIconType:
      type: string
      enum: [IC_SEARCH, IC_BACK, IC_CLOSE, IC_SETTINGS, IC_CHEVRON_RIGHT, IC_USER, IC_LOCK, IC_INFO, IC_HELP, NOTIFICATIONS, PUBLIC, LANGUAGE, DELETE, PERSON, POLICY]
    AppImageType:
      type: object
      properties:
        url:
          type: string
        placeholder:
          type: string
    AppAction:
      type: object
      properties:
        type:
          type: string
        url:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
    AppStringType:
      type: object
      properties:
        value:
          type: string
        isHtml:
          type: boolean
        args:
          type: array
          items:
            type: string
    AppTextFieldType:
      type: string
      enum: [TEXT, EMAIL, PASSWORD, PHONE, NUMBER]
