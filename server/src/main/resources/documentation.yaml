openapi: 3.0.3
info:
  title: DLearn BFF API
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.

    **Test Credentials:**
    - Email: `admin@dlearn.com`
    - Password: `123456`
  version: 1.11.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  # --- Authentication ---
  /v1/auth/login:
    post:
      summary: Login with credentials
      tags:
        - Authentication
      parameters:
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "admin@dlearn.com"
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /v1/auth/register:
    post:
      summary: Register a new user (Native Flow)
      tags:
        - Authentication
      parameters:
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request (Validation Error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /v1/auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      parameters:
        - $ref: '#/components/parameters/acceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /v1/auth/logout:
    post:
      summary: Logout user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  # --- Challenge Engine ---
  /v1/auth/challenge/resolve:
    post:
      summary: Resolve a security challenge (MFA)
      tags:
        - Authentication
      parameters:
        - name: X-Transaction-Id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveChallengeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveChallengeResponse'
  /v1/auth/challenge/resend:
    post:
      summary: Resend challenge code
      tags:
        - Authentication
      parameters:
        - name: X-Transaction-Id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  # --- User Actions ---
  /v1/users:
    get:
      summary: List all users
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /v1/password/change:
    post:
      summary: Change user password
      tags:
        - User
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, newPassword]
              properties:
                userId:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: OK

  # --- SDUI Gateway ---
  /v1/app:
    post:
      summary: SDUI Gateway / BFF Generic Endpoint
      description: |
        Ponto de entrada único para renderização de telas e execução de ações.
        Use os exemplos para carregar requests prontas.

        **Principais Paths:**
        - `home`: Dashboard principal. Aceita filtro via parâmetro `type` (ex: ALL, MOVIES, SERIES, FAVORITE, WATCHLIST).
        - `movies`: Detalhes de um filme ou série.
        - `search`: Busca global.
        - `profile`: Perfil do usuário.
        - `favorite`: Lista de favoritos do usuário.
        - `watchlist`: Lista de filmes/séries para assistir.
      tags:
        - SDUI Gateway
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/userAgent'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/xCountry'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
            examples:
              Home:
                summary: Tela Inicial
                value:
                  path: "home"
              HomeWithFilters:
                summary: Home com filtros (Favoritos/Watchlist)
                value:
                  path: "home"
                  params:
                    type: "FAVORITE"
              MovieDetail:
                summary: Detalhes do Filme
                value:
                  path: "movies"
                  params:
                    id: "550"
                    mediaType: "MOVIE"
              FavoriteAction:
                summary: Marcar como favorito (Ação no Detalhe)
                value:
                  path: "movies"
                  params:
                    id: "550"
                    mediaType: "MOVIE"
                    favorite: "true"
              WatchlistAction:
                summary: Adicionar à Watchlist (Ação no Detalhe)
                value:
                  path: "movies"
                  params:
                    id: "550"
                    mediaType: "MOVIE"
                    watchlist: "true"
              FavoriteList:
                summary: Tela de Favoritos
                value:
                  path: "favorite"
              Watchlist:
                summary: Tela de Watchlist
                value:
                  path: "watchlist"
              Profile:
                summary: Tela de Perfil
                value:
                  path: "profile"
              Search:
                summary: Tela de Busca
                value:
                  path: "search"
                  params:
                    query: "Fight Club"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
              examples:
                HomeWithDropdown:
                  summary: Home com Dropdown de Filtros (Favoritos e Watchlist)
                  value:
                    id: "home_screen"
                    components:
                      - type: "ChipGroupComponent"
                        items:
                          - id: "filter_type"
                            label: "Explorar"
                            isSelected: true
                            hasDropDown: true
                            options:
                              - id: "ALL"
                                label: "Tudo"
                                actionUrl: "home?type=ALL"
                              - id: "MOVIES"
                                label: "Filmes"
                                actionUrl: "home?type=MOVIES"
                              - id: "SERIES"
                                label: "Séries"
                                actionUrl: "home?type=SERIES"
                              - id: "FAVORITE"
                                label: "Meus Favoritos"
                                actionUrl: "home?type=FAVORITE"
                              - id: "WATCHLIST"
                                label: "Minha Lista"
                                actionUrl: "home?type=WATCHLIST"

  /v1/main:
    get:
      summary: Get Main Shell (SDUI)
      tags:
        - SDUI
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    appVersion:
      name: X-App-Version
      in: header
      required: false
      schema:
        type: integer
      example: 1
    userAgent:
      name: User-Agent
      in: header
      required: false
      schema:
        type: string
      example: "DLearn/1.0.0 (Swagger)"
    acceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      example: pt-BR
    xCountry:
      name: X-Country
      in: header
      required: false
      schema:
        type: string
      example: BR
    challengeToken:
      name: X-Challenge-Token
      in: header
      required: false
      schema:
        type: string
  schemas:
    # --- Auth & User ---
    AppError:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/AppErrorCode'
        message:
          type: string
          example: "E-mail já cadastrado"
        details:
          type: object
          additionalProperties:
            type: string
    AppErrorCode:
      type: string
      enum: [UNKNOWN_ERROR, NETWORK_ERROR, SERVER_ERROR, BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, TIMEOUT, INVALID_CREDENTIALS, USER_NOT_FOUND, USER_ALREADY_EXISTS, INVALID_TOKEN, EXPIRED_TOKEN, EMAIL_ALREADY_IN_USE, VALIDATION_FAILED, FIELD_REQUIRED, INVALID_FORMAT, MOVIE_NOT_FOUND, PAYMENT_FAILED, INSUFFICIENT_FUNDS, TRANSACTION_ID_REQUIRED, INVALID_CHALLENGE_CODE]
    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        imageUrl:
          type: string
        isPremium:
          type: boolean
        phoneNumber:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
        challengeRequired:
          type: boolean

    # --- Challenge Models ---
    ChallengeType:
      type: string
      enum: [OTP_SMS, OTP_EMAIL, BIOMETRIC, PASSWORD, TOTP, PUSH_NOTIFICATION, KBA, DEVICE_BINDING, UNKNOWN]
    ResolveChallengeRequest:
      type: object
      required: [type, answers]
      properties:
        type:
          $ref: '#/components/schemas/ChallengeType'
        answers:
          type: string
    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken:
          type: string
        success:
          type: boolean
        message:
          type: string

    # --- SDUI Core ---
    AppRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          enum: ["home", "movies", "search", "favorite", "watchlist", "profile", "welcome", "verify_account", "faq", "users"]
          example: "home"
        params:
          type: object
          additionalProperties:
            type: string
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string

    # --- SDUI Components ---
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar:
              $ref: '#/components/schemas/Component'
            searchBar:
              $ref: '#/components/schemas/Component'
            chipGroup:
              $ref: '#/components/schemas/Component'
            bottomBar:
              $ref: '#/components/schemas/Component'
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            showSearch:
              type: boolean
    AppTopBarListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AppTopBarItem'
            selectedRoute:
              type: string
    AppTopBarItem:
      type: object
      properties:
        topBar:
          $ref: '#/components/schemas/AppTopBarComponent'
        route:
          type: string
    AppSearchBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            query:
              type: string
            placeholder:
              type: string
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppEmptyStateComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            image:
              $ref: '#/components/schemas/AppImageType'
    AppListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppSwitchRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            icon:
              $ref: '#/components/schemas/AppIconType'
            preferenceKey:
              type: string
            isChecked:
              type: boolean
    AppSelectionRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            value:
              type: string
            preferenceKey:
              type: string
            isSelected:
              type: boolean
    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            rating:
              type: string
            year:
              type: string
            duration:
              type: string
            contentRating:
              type: string
            genre:
              type: string
            movieType:
              type: string
            isPremium:
              type: boolean
            rank:
              type: integer
            actionUrl:
              type: string
    AppMovieDetailHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            imageUrl:
              type: string
            year:
              type: string
            duration:
              type: string
            genre:
              type: string
            rating:
              type: number
            trailerId:
              type: string
            downloadActionUrl:
              type: string
            shareActionUrl:
              type: string
            isFavorite:
              type: boolean
            isInList:
              type: boolean
            favoriteActionUrl:
              type: string
            watchlistActionUrl:
              type: string
            providers:
              type: array
              items:
                $ref: '#/components/schemas/WatchProviderComponent'
    WatchProviderComponent:
      type: object
      properties:
        name:
          type: string
        iconUrl:
          type: string
        priceInfo:
          type: string
        appUrl:
          type: string
        webUrl:
          type: string
        tmdbUrl:
          type: string
    AppExpandableSectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            text:
              type: string
            maxLines:
              type: integer
    CarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    MovieCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    BannerCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    FullScreenBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
    ChipGroupComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ChipItem'
    ChipItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        isSelected:
          type: boolean
        hasDropDown:
          type: boolean
        isFilter:
          type: boolean
        options:
          type: array
          items:
            $ref: '#/components/schemas/ChipItem'
    UserRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            role:
              type: string
            imageUrl:
              type: string
            actionUrl:
              type: string
    ProfileRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            editActionUrl:
              type: string
    AppProfileHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            onImagePickedAction:
              type: string
    AppTextFieldComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            value:
              type: string
            placeholder:
              $ref: '#/components/schemas/AppStringType'
            label:
              $ref: '#/components/schemas/AppStringType'
            supportingText:
              $ref: '#/components/schemas/AppStringType'
            isError:
              type: boolean
            fieldType:
              $ref: '#/components/schemas/AppTextFieldType'
            key:
              type: string
    AppFeedbackComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            imageSource:
              type: string
            primaryText:
              type: string
            secondaryText:
              type: string
    PremiumBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            icon:
              $ref: '#/components/schemas/AppIconType'
    AppHtmlTextComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            html:
              type: string
    AppSnackbarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            message:
              type: string
            snackbarType:
              $ref: '#/components/schemas/AppSnackbarType'
            durationMillis:
              type: integer
              format: int64

    # --- Missing/New SDUI Components ---
    AppMainContentComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BottomNavItem'
            selectedActionUrl:
              type: string
    BottomNavItem:
      type: object
      properties:
        label:
          type: string
        actionUrl:
          type: string
        icon:
          $ref: '#/components/schemas/AppIconType'
    AppSectionTitleComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
    SectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/SectionItem'
    SectionItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
        icon:
          $ref: '#/components/schemas/AppIconType'
        actionUrl:
          type: string
    FooterComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            label:
              type: string
            actionUrl:
              type: string
            closeUrl:
              type: string
    AppLoadingComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    AppErrorComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            error:
              $ref: '#/components/schemas/AppError'

    # --- Types & Enums ---
    AppSnackbarType:
      type: string
      enum: [SUCCESS, ERROR, WARNING]
    AppIconType:
      type: string
      enum: [HOME, SEARCH, FAVORITE, PERSON, WATCHLIST, LOCK, NOTIFICATIONS, LANGUAGE, PUBLIC, DELETE, POLICY, HELP, INFO, WORKSPACE_PREMIUM, PLAY_ARROW, DOWNLOAD, SHARE, CALENDAR_MONTH, SCHEDULE, STAR, UNKNOWN]
    AppImageType:
      type: object
      properties:
        url:
          type: string
        placeholder:
          type: string
    AppStringType:
      type: object
      properties:
        value:
          type: string
        isHtml: { type: boolean }
        args:
          type: array
          items: { type: string }
    AppTextFieldType:
      type: string
      enum: [TEXT, EMAIL, PASSWORD, PHONE, NUMBER, NONE]
