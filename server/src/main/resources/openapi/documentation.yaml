openapi: 3.0.3
info:
  title: DLearn BFF API
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.
  version: 1.1.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/app:
    post:
      summary: SDUI Gateway / BFF Generic Endpoint
      tags:
        - SDUI Gateway
      description: |
        Central gateway for dynamic screens and actions.
        The client sends a `path` (slug) and optional `params`.
        
        **Common Paths:**
        - `home`: Main dashboard. Aceita filtro via parâmetro `type` (ex: ALL, MOVIES, SERIES, FAVORITE, WATCHLIST).
        - `favorite`: User's favorite movies/series.
        - `watchlist`: User's watchlist.
        - `search`: Search for media.
        - `profile`: User settings and info.
        - `movie_detail`: Full info about a movie/series. (Requires `id` and `mediaType` in params).
      parameters:
        - $ref: 'components.yaml#/components/parameters/userId'
        - $ref: 'components.yaml#/components/parameters/appVersion'
        - $ref: 'components.yaml#/components/parameters/acceptLanguage'
        - $ref: 'components.yaml#/components/parameters/country'
        - $ref: 'components.yaml#/components/parameters/challengeToken'
        - $ref: 'components.yaml#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/AppRequest'
            examples:
              Home:
                summary: Tela Inicial
                value:
                  path: "home"
                  params: { "type": "ALL" }
              HomeWithFavoriteFilter:
                summary: Filtro de Meus Favoritos
                value:
                  path: "home"
                  params: { "type": "FAVORITE" }
              HomeWithWatchlistFilter:
                summary: Filtro de Minha Lista
                value:
                  path: "home"
                  params: { "type": "WATCHLIST" }
              Favorites:
                summary: Tela de Favoritos (Nativa)
                value:
                  path: "favorite"
              Watchlist:
                summary: Tela de Watchlist (Nativa)
                value:
                  path: "watchlist"
              MovieDetail:
                summary: Detalhes do Filme
                value:
                  path: "movie_detail"
                  params: { "id": "550", "mediaType": "MOVIE" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/Screen'
              examples:
                HomeWithDropdown:
                  summary: Resposta da Home com Dropdown de Filtros
                  value:
                    id: "home_screen"
                    components:
                      - type: "ChipGroupComponent"
                        items:
                          - id: "filter_type"
                            label: "Explorar"
                            isSelected: true
                            hasDropDown: true
                            options:
                              - id: "ALL"
                                label: "Tudo"
                                actionUrl: "home?type=ALL"
                              - id: "MOVIES"
                                label: "Filmes"
                                actionUrl: "home?type=MOVIES"
                              - id: "SERIES"
                                label: "Séries"
                                actionUrl: "home?type=SERIES"
                              - id: "FAVORITE"
                                label: "Meus Favoritos"
                                actionUrl: "home?type=FAVORITE"
                              - id: "WATCHLIST"
                                label: "Minha Lista"
                                actionUrl: "home?type=WATCHLIST"

  /v1/auth/login:
    post:
      summary: User Login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/AuthResponse'
  /v1/auth/register:
    post:
      summary: User Registration
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/AuthResponse'
  /v1/auth/refresh:
    post:
      summary: Refresh Access Token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/AuthResponse'
  /v1/auth/logout:
    post:
      summary: Logout User
      tags:
        - Authentication
      responses:
        '200':
          description: OK
  /v1/password/change:
    post:
      summary: Change User Password (MFA Protected)
      tags:
        - Security
      parameters:
        - $ref: 'components.yaml#/components/parameters/userId'
        - $ref: 'components.yaml#/components/parameters/challengeToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully

  /v1/auth/challenge/resolve:
    post:
      summary: Resolve Security Challenge
      tags:
        - Security
      parameters:
        - $ref: 'components.yaml#/components/parameters/transactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components.yaml#/components/schemas/ResolveChallengeRequest'
      responses:
        '200':
          description: Challenge Resolved
          content:
            application/json:
              schema:
                $ref: 'components.yaml#/components/schemas/ResolveChallengeResponse'
