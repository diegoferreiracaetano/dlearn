openapi: 3.0.3
info:
  title: DLearn BFF API
  description: API for Server-Driven UI in DLearn App
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/home:
    get:
      summary: Get Home Screen
      description: Returns the Home screen configuration with SDUI components
      parameters: &common_params
        - name: userId
          in: query
          required: false
          schema:
            type: string
          example: diego
        - name: X-App-Version
          in: header
          required: false
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/movie/{movieId}:
    get:
      summary: Get Movie Detail Screen
      description: Returns the Movie Detail screen configuration for a specific movie
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
          example: spider-man
        - *common_params
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

components:
  schemas:
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar:
              $ref: '#/components/schemas/AppTopBarComponent'
            bottomBar:
              $ref: '#/components/schemas/BottomNavigationComponent'
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            showSearch:
              type: boolean
    MovieHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            imageUrl:
              type: string
            year:
              type: string
            duration:
              type: string
            genre:
              type: string
            rating:
              type: string
    ActionButtonsComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            primaryButton:
              $ref: '#/components/schemas/ActionButton'
            secondaryButtons:
              type: array
              items:
                $ref: '#/components/schemas/ActionButton'
    ActionButton:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        icon:
          type: string
        actionUrl:
          type: string
    ExpandableTextComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            text:
              type: string
            moreLabel:
              type: string
    CastCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            cast:
              type: array
              items:
                $ref: '#/components/schemas/CastMember'
    CastMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        imageUrl:
          type: string
    EpisodeListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            seasons:
              type: array
              items:
                type: string
            selectedSeason:
              type: string
            episodes:
              type: array
              items:
                $ref: '#/components/schemas/EpisodeItem'
    EpisodeItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        duration:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        isPremium:
          type: boolean
        actionUrl:
          type: string
    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BottomNavigationItem'
    BottomNavigationItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        icon:
          type: string
        selectedIcon:
          type: string
        actionUrl:
          type: string
