openapi: 3.0.3
info:
  title: DLearn BFF API
  description: API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/app:
    post:
      summary: SDUI Gateway / BFF Generic Endpoint
      description: Handles all dynamic screens and actions (Favorites, Watchlist, etc.) based on the request path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/home:
    get:
      summary: Get Home Screen
      description: Returns the Home screen configuration with SDUI components
      parameters: &common_params
        - name: userId
          in: query
          required: false
          schema:
            type: string
          example: diego
        - name: X-App-Version
          in: header
          required: false
          schema:
            type: integer
          example: 1
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, MOVIE, SERIES]
          example: ALL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/search:
    get:
      summary: Get Search Shell
      description: Returns the search screen shell configuration (container and search bar layout).
      parameters:
        - *common_params
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/search/content:
    get:
      summary: Search Content
      description: Returns the search content results based on the query, to be displayed inside the Search Shell.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          example: Spider-Man
        - *common_params
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/movie/{movieId}:
    get:
      summary: Get Movie Detail Screen
      description: Returns the Movie Detail screen configuration for a specific movie
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
          example: spider-man
        - *common_params
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'

components:
  schemas:
    AppRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: The target route or action (e.g., 'watchlist', 'favorite')
        params:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar:
              $ref: '#/components/schemas/AppTopBarComponent'
            bottomBar:
              $ref: '#/components/schemas/BottomNavigationComponent'
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            showSearch:
              type: boolean
    AppSearchBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            query:
              type: string
            placeholder:
              type: string
            content:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppEmptyStateComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            imageSource:
              type: string
    AppListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    MovieItemComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            rating:
              type: string
            year:
              type: string
            duration:
              type: string
            contentRating:
              type: string
            genre:
              type: string
            movieType:
              type: string
            isPremium:
              type: boolean
            rank:
              type: integer
            actionUrl:
              type: string
    AppSearchContentComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    MovieHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            imageUrl:
              type: string
            year:
              type: string
            duration:
              type: string
            genre:
              type: string
            rating:
              type: string
    ActionButtonsComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            primaryButton:
              $ref: '#/components/schemas/ActionButton'
            secondaryButtons:
              type: array
              items:
                $ref: '#/components/schemas/ActionButton'
    ActionButton:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        icon:
          type: string
        actionUrl:
          type: string
    ExpandableTextComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            text:
              type: string
            moreLabel:
              type: string
    CastCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            cast:
              type: array
              items:
                $ref: '#/components/schemas/CastMember'
    CastMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        imageUrl:
          type: string
    EpisodeListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            seasons:
              type: array
              items:
                type: string
            selectedSeason:
              type: string
            episodes:
              type: array
              items:
                $ref: '#/components/schemas/EpisodeItem'
    EpisodeItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        duration:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        isPremium:
          type: boolean
        actionUrl:
          type: string
    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BottomNavigationItem'
    BottomNavigationItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        icon:
          type: string
        selectedIcon:
          type: string
        actionUrl:
          type: string
