openapi: 3.0.3
info:
  title: DLearn BFF API
  description: |
    API for Server-Driven UI in DLearn App. Supporting dynamic routes and generic flows.
    Security and Multi-Factor Authentication (MFA) are handled by a Generic Challenge Engine.
  version: 1.1.0
servers:
  - url: http://localhost:8081
    description: Local Server
paths:
  /v1/main:
    get:
      summary: Get Main Shell
      description: Returns the main screen shell configuration (container with bottom navigation and initial components).
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/app:
    post:
      summary: SDUI Gateway / BFF Generic Endpoint
      description: |
        Central gateway for dynamic screens and actions.
        Handles the following paths via SDUI:
        - `home`: Main dashboard
        - `favorite`: User favorites list or toggle action
        - `watchlist`: User watchlist or toggle action
        - `profile`: User profile details
        - `profile/edit`: Edit profile form
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/home:
    get:
      summary: Get Home Screen
      description: Returns the Home screen configuration with SDUI components
      parameters: 
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, MOVIE, SERIES]
          example: ALL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/search/main:
    get:
      summary: Get Search Main Content
      description: Returns the initial search screen configuration.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/search/result:
    get:
      summary: Search Content Result
      description: Returns the search results based on the query.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: Spider-Man
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/movie/{movieId}:
    get:
      summary: Get Movie Detail Screen
      description: Returns the Movie Detail screen configuration for a specific movie
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: string
          example: spider-man
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/profile:
    get:
      summary: Get Profile Screen
      description: Returns the Profile screen configuration
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/profile/edit:
    get:
      summary: Get Edit Profile Screen
      description: Returns the Edit Profile screen configuration with input fields
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /v1/profile/update:
    post:
      summary: Update Profile Data
      description: Updates the user profile data based on form submission
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
            example:
              full_name: "Tiffany Jearsey"
              email: "tiffany@example.com"
              phone: "+1 234 567 890"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /v1/password/change:
    post:
      summary: Change User Password (MFA Protected)
      description: |
        Changes the user password. Este endpoint é protegido pelo **Motor de Desafios**.
        
        **🛡️ Fluxo de Desafio (Exemplo):**
        1. **Tentativa de Ação:** O App chama `POST /v1/password/change`. O App pode enviar o header `X-Challenge-Preference: BIOMETRIC` para sugerir o método.
        2. **Interrupção por MFA (428):** O servidor identifica que a rota exige MFA. Se não houver token válido, retorna **HTTP 428 Precondition Required**. Retorna um `ChallengeSession` com `transactionId` e métodos permitidos.
        3. **Resolução:** O App captura o erro, exibe a tela de desafio e chama `POST /v1/auth/challenge/resolve`.
        4. **Emissão de Token:** O servidor valida a resposta e retorna um `validatedToken`.
        5. **Re-execução:** O App repete a chamada original `POST /v1/password/change` enviando o header `X-Challenge-Token: [TOKEN]`.
        6. **Sucesso:** O servidor valida o token no header e processa a alteração de senha.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '428':
          description: Precondition Required (Challenge Needed). Inicia o fluxo de MFA.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeSession'

  /v1/auth/challenge/resolve:
    post:
      summary: Resolve Security Challenge
      description: |
        Valida a resposta do usuário para um desafio específico e emite um token de autorização.
        
        **🛡️ Fluxo de Desafio:**
        - Este endpoint é chamado após o App receber um erro **428 Precondition Required** em uma rota protegida.
        - Se bem-sucedido, retorna o `validatedToken` que deve ser usado no header `X-Challenge-Token` da rota original para completar o processo.
        
        **Payload Exemplo:**
        `{ "transactionId": "...", "type": "OTP_SMS", "answers": { "otp": "123456" } }`
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveChallengeRequest'
      responses:
        '200':
          description: Challenge Resolved. Use o `validatedToken` para completar a ação original.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveChallengeResponse'

  /v1/auth/challenge/resend:
    post:
      summary: Resend Challenge Code
      description: Solicita o reenvio de um código (ex: OTP via SMS/Email) para a sessão ativa.
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/appVersion'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/challengeToken'
        - $ref: '#/components/parameters/challengePreference'
      responses:
        '200':
          description: Code Resent

components:
  parameters:
    userId:
      name: userId
      in: query
      required: false
      schema:
        type: string
      example: diego
    appVersion:
      name: X-App-Version
      in: header
      required: false
      schema:
        type: integer
      example: 1
    acceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      example: pt-BR
    challengeToken:
      name: X-Challenge-Token
      in: header
      required: false
      description: "Token obtido após a resolução de um desafio."
      schema:
        type: string
    challengePreference:
      name: X-Challenge-Preference
      in: header
      required: false
      description: "Sugestão de método de desafio (ex: BIOMETRIC)."
      schema:
        $ref: '#/components/schemas/ChallengeType'
  schemas:
    # --- Challenge Engine Models ---
    ChallengeType:
      type: string
      enum: [OTP_SMS, OTP_EMAIL, BIOMETRIC, PASSWORD, TOTP, PUSH_NOTIFICATION, KBA, DEVICE_BINDING, UNKNOWN]
      description: The verification method type.

    ChallengeStatus:
      type: string
      enum: [SUCCESS, CHALLENGE_REQUIRED, ERROR]

    ChallengeSession:
      type: object
      required: [transactionId, challenges]
      properties:
        transactionId:
          type: string
          description: Unique ID for the security transaction.
        challenges:
          type: array
          items:
            $ref: '#/components/schemas/Challenge'
        expiresAt:
          type: integer
          format: int64

    Challenge:
      type: object
      required: [challengeType]
      properties:
        challengeType:
          $ref: '#/components/schemas/ChallengeType'
        data:
          type: object
          description: Contextual data for the UI (e.g., masked phone/email).
          additionalProperties:
            type: string

    ResolveChallengeRequest:
      type: object
      required: [transactionId, type, answers]
      properties:
        transactionId:
          type: string
        type:
          $ref: '#/components/schemas/ChallengeType'
        answers:
          type: object
          description: "Map of answers (e.g. key 'otp' with value '123456')."
          additionalProperties:
            type: string

    ResolveChallengeResponse:
      type: object
      properties:
        validatedToken:
          type: string
          description: The token to be sent in 'X-Challenge-Token' header.
        success:
          type: boolean
        message:
          type: string

    # --- Business Models ---
    ChangePasswordRequest:
      type: object
      required: [userId, newPassword]
      properties:
        userId:
          type: string
        newPassword:
          type: string
    ChangePasswordResponse:
      type: object
      properties:
        message:
          type: string
        success:
          type: boolean

    # --- SDUI Infrastructure ---
    AppRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: The target route or action (e.g., 'home', 'profile/edit')
          example: "home"
        params:
          type: object
          additionalProperties:
            type: string
          example: {}
        metadata:
          type: object
          additionalProperties:
            type: string
          example: {}
    Screen:
      type: object
      properties:
        id:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
    Component:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
    AppContainerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            topBar:
              $ref: '#/components/schemas/Component'
            searchBar:
              $ref: '#/components/schemas/Component'
            chipGroup:
              $ref: '#/components/schemas/Component'
            bottomBar:
              $ref: '#/components/schemas/Component'
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppTopBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            showSearch:
              type: boolean
    AppTopBarListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AppTopBarItem'
            selectedRoute:
              type: string
    AppTopBarItem:
      type: object
      properties:
        topBar:
          $ref: '#/components/schemas/AppTopBarComponent'
        route:
          type: string
    AppSearchBarComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            query:
              type: string
            placeholder:
              type: string
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    AppEmptyStateComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            image:
              $ref: '#/components/schemas/AppImageType'
    AppListComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            components:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    movie_item:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
            rating:
              type: string
            year:
              type: string
            duration:
              type: string
            contentRating:
              type: string
            genre:
              type: string
            movieType:
              type: string
            isPremium:
              type: boolean
            rank:
              type: integer
            actionUrl:
              type: string
    app_search_content:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    AppMovieDetailHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            imageUrl:
              type: string
            year:
              type: string
            duration:
              type: string
            genre:
              type: string
            rating:
              type: number
            trailerId:
              type: string
            downloadActionUrl:
              type: string
            shareActionUrl:
              type: string
            isFavorite:
              type: boolean
            isInList:
              type: boolean
            providers:
              type: array
              items:
                $ref: '#/components/schemas/WatchProviderComponent'
    WatchProviderComponent:
      type: object
      properties:
        name:
          type: string
        iconUrl:
          type: string
        priceInfo:
          type: string
        appUrl:
          type: string
        webUrl:
          type: string
        tmdbUrl:
          type: string
    AppExpandableSectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            text:
              type: string
            maxLines:
              type: integer
    CarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/Component'
    MovieCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    BannerCarouselComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/movie_item'
    FullScreenBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            id:
              type: string
            title:
              type: string
            subtitle:
              type: string
            imageUrl:
              type: string
    ChipGroupComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ChipItem'
    ChipItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        isSelected:
          type: boolean
        hasDropDown:
          type: boolean
        isFilter:
          type: boolean
        options:
          type: array
          items:
            $ref: '#/components/schemas/ChipItem'
    UserRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            role:
              type: string
            imageUrl:
              type: string
            actionUrl:
              type: string
    ProfileRowComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            editActionUrl:
              type: string
    AppProfileHeaderComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            imageUrl:
              type: string
            onImagePickedAction:
              $ref: '#/components/schemas/AppAction'
    AppTextFieldComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            value:
              type: string
            placeholder:
              $ref: '#/components/schemas/AppStringType'
            label:
              $ref: '#/components/schemas/AppStringType'
            supportingText:
              $ref: '#/components/schemas/AppStringType'
            isError:
              type: boolean
            fieldType:
              $ref: '#/components/schemas/AppTextFieldType'
            key:
              type: string
    AppFeedbackComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            imageSource:
              type: string
            primaryText:
              type: string
            secondaryText:
              type: string
    PremiumBannerComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            icon:
              $ref: '#/components/schemas/AppIconType'
            actionUrl:
              type: string
    SectionComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/SectionItem'
    SectionItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
        icon:
          $ref: '#/components/schemas/AppIconType'
        actionUrl:
          type: string
    AppSectionTitleComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            title:
              type: string
    FooterComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            label:
              type: string
            actionUrl:
              type: string
    AppLoadingComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    AppErrorComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    AppMainContentComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
    BottomNavigationComponent:
      allOf:
        - $ref: '#/components/schemas/Component'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/BottomNavItem'
            selectedRoute:
              type: string
    BottomNavItem:
      type: object
      properties:
        label:
          type: string
        route:
          type: string
        icon:
          $ref: '#/components/schemas/AppIconType'
    AppIconType:
      type: string
      enum: [HOME, SEARCH, FAVORITE, PERSON, WATCHLIST, LOCK, NOTIFICATIONS, LANGUAGE, PUBLIC, DELETE, POLICY, HELP, INFO, WORKSPACE_PREMIUM, PLAY_ARROW, DOWNLOAD, SHARE, CALENDAR_MONTH, SCHEDULE, STAR, UNKNOWN]
    AppImageType:
      type: string
      enum: [SEARCH, WATCHLIST, FAVORITE, EMPTY_STATE, UNKNOWN]
    AppStringType:
      type: string
      enum: [PROFILE_TITLE, PREMIUM_MEMBER, PREMIUM_DESCRIPTION, SECTION_ACCOUNT, ITEM_MEMBER, ITEM_PASSWORD, SECTION_GENERAL, ITEM_NOTIFICATION, ITEM_LANGUAGE, ITEM_COUNTRY, ITEM_CLEAR_CACHE, SECTION_MORE, ITEM_LEGAL, ITEM_HELP, ITEM_ABOUT, LOGOUT, HOME_TITLE, HOME_SUBTITLE, FILTER_SERIES, FILTER_MOVIES, FILTER_CATEGORIES, SECTION_TOP_10, SECTION_POPULAR, NAV_HOME, NAV_WATCHLIST, NAV_SEARCH, NAV_FAVORITES, NAV_PROFILE, APP_NAME, EDIT_PROFILE_TITLE, FIELD_FULL_NAME, FIELD_EMAIL, FIELD_PASSWORD, FIELD_PHONE_NUMBER, SAVE_CHANGES, ERROR_NAME_EXIST, DETAIL_TRAILER, DETAIL_STORY_LINE, DETAIL_CAST_CREW, DETAIL_EPISODE, DETAIL_WATCH_NOW, SEARCH_PLACEHOLDER, SEARCH_EMPTY_TITLE, SEARCH_EMPTY_DESCRIPTION, WATCHLIST_EMPTY_TITLE, WATCHLIST_EMPTY_DESCRIPTION, FAVORITE_EMPTY_TITLE, FAVORITE_EMPTY_DESCRIPTION, PASSWORD_CHANGE_SUCCESS, PASSWORD_OTP_REQUIRED, PASSWORD_OTP_VERIFIED, INTERNAL_SERVER_ERROR, UNKNOWN]
    AppTextFieldType:
      type: string
      enum: [NONE, EMAIL, PASSWORD, PHONE]
    AppAction:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
    deeplink:
      allOf:
        - $ref: '#/components/schemas/AppAction'
        - type: object
          properties:
            url:
              type: string
            params:
              type: object
              additionalProperties:
                type: string
    navigation:
      allOf:
        - $ref: '#/components/schemas/AppAction'
        - type: object
          properties:
            route:
              type: string
            params:
              type: object
              additionalProperties:
                type: string
    app_call:
      allOf:
        - $ref: '#/components/schemas/AppAction'
        - type: object
          properties:
            path:
              type: string
            params:
              type: object
              additionalProperties:
                type: string
            metadata:
              type: object
              additionalProperties:
                type: string
            onSuccess:
              $ref: '#/components/schemas/AppAction'
            onFailure:
              $ref: '#/components/schemas/AppAction'
